<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terê Verde Online - Gerenciar Eventos</title>
    <link rel="stylesheet" href="CSS/style-adm.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html">
                <img src="img/tere verde sem fundo.png" alt="Logo Terê Verde Online" class="logo">
            </a>
            <nav>
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="trilhas.html">Trilhas</a></li>
                    <li><a href="cachoeiras.html">Cachoeiras</a></li>
                    <li><a href="#">Eventos</a></li>
                    <li><a href="admin-login.html">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-title">
            <div class="container">
                <h2>📅 Gerenciar Eventos</h2>
            </div>
        </section>

        <section class="admin-form-section">
            <div class="container">
                <div class="admin-form-card">
                    <h3>Cadastrar Novo Evento</h3>
                    <form action="#" method="post">
                        
                        <div class="form-group">
                            <label for="evento-nome">Nome do Evento:</label>
                            <input type="text" id="evento-nome" name="evento-nome" placeholder="Ex: Festival de Montanhismo" required>
                        </div>

                        <div class="form-group">
                            <label for="evento-parque">Parque:</label>
                            <select id="evento-parque" name="evento-parque" required>
                                <option value="" disabled selected>Selecione um parque</option>
                                <option value="parnaso">PARNASO</option>
                                <option value="petp">PETP</option>
                                <option value="pnmmt">PNMMT</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="data-inicio">Data de Início:</label>
                            <input type="date" id="data-inicio" name="data-inicio" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="data-fim">Data de Fim (opcional):</label>
                            <input type="date" id="data-fim" name="data-fim">
                        </div>
                        
                        <div class="form-group">
                            <label for="observacao">Observação (Descrição do Evento):</label>
                            <textarea id="observacao" name="observacao" rows="5" placeholder="Descreva o evento, horários, etc."></textarea>
                        </div>

                        <button type="submit" class="btn">Publicar Evento</button>
                    </form>
                </div>
                <a href="admin-login-page.html" class="btn-voltar">← Voltar ao Painel</a>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2025 Terê Verde Online. <br> 
                Todos os direitos reservados.</p>
        </div>
    </footer>
</body>
</html>
